kind = "web"
previewPath = "/"
title = "CommunityShield"
version = "1.0.0"
id = "artifacts/community-shield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18354
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/community-shield run dev"

[services.env]
PORT = "18354"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/community-shield", "run", "build"]
publicDir = "artifacts/community-shield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
