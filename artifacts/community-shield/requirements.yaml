packages:
  "leaflet": "Interactive map core"
  "react-leaflet": "React bindings for leaflet"
  "@types/leaflet": "Types for leaflet"
  "clsx": "Class merging"
  "tailwind-merge": "Class merging"
  "framer-motion": "Animations and layout transitions"
  "lucide-react": "Icons"

images:
  - path: "artifacts/community-shield/public/images/logo-mark.png"
    description: "Minimalist modern logo mark combining a safety shield and a community connection node, deep blue and teal, transparent background, flat vector style, professional civic tech feel"
